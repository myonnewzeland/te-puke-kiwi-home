  <!-- ============================================================
       CRITICAL CSS — inlined to eliminate render-blocking
       This is the bare minimum CSS needed to render above-the-fold
       content without waiting for the full stylesheet to load.
       Prevents Flash of Unstyled Content (FOUC) on first paint.
  ============================================================ -->
  <style>
    /* Reset & base — prevents layout shift before Tailwind CSS loads */
    *,::before,::after{box-sizing:border-box;border-width:0;border-style:solid}
    html{line-height:1.5;-webkit-text-size-adjust:100%;font-family:'DM Sans',ui-sans-serif,system-ui,sans-serif;scroll-behavior:smooth}
    body{margin:0;background-color:hsl(40,33%,97%);color:hsl(150,20%,15%)}
    img,video{max-width:100%;height:auto;display:block}
    /* Hero placeholder — prevents CLS before image loads */
    .hero-placeholder{background:hsl(142,40%,20%);min-height:500px}
    /* Spinner for Suspense fallback */
    @keyframes spin{to{transform:rotate(360deg)}}
    .animate-spin{animation:spin 1s linear infinite}
    /* Prevent invisible text during font load */
    h1,h2,h3,h4{font-family:'Playfair Display',Georgia,serif}
  </style>

  <!-- ============================================================
       SELF-HOSTED FONTS
       Fonts are preloaded to avoid layout shift (FOUT / CLS).
       "crossorigin" is required for woff2 preload to work correctly.
  ============================================================ -->
  <link rel="preload" as="font" href="/fonts/dm-sans-400.woff2" type="font/woff2" crossorigin />
  <link rel="preload" as="font" href="/fonts/playfair-display-600.woff2" type="font/woff2" crossorigin />
  <style>
    /* Body font: DM Sans — clean, readable sans-serif */
    @font-face {
      font-family: 'DM Sans';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap; /* shows fallback font immediately, swaps when loaded */
      src: url('/fonts/dm-sans-400.woff2') format('woff2');
    }
    /* Heading font: Playfair Display — elegant serif for titles */
    @font-face {
      font-family: 'Playfair Display';
      font-style: normal;
      font-weight: 600 700;
      font-display: swap;
      src: url('/fonts/playfair-display-600.woff2') format('woff2');
    }
  </style>

  <!-- ============================================================
       PERFORMANCE: PRELOAD LCP HERO IMAGE
       The hero image is the Largest Contentful Paint (LCP) element.
       Preloading it tells the browser to fetch it immediately,
       before it discovers it in the JS bundle. This is the single
       biggest LCP win for a React SPA.
  ============================================================ -->
  <!-- Preload LCP hero image — served from same origin, no preconnect needed -->
  <link
    rel="preload"
    as="image"
    href="/images/te-puke-hostel-park-cabins-caravans-1080w.webp"
    imagesrcset="/images/te-puke-hostel-park-cabins-caravans-400w.webp 400w, /images/te-puke-hostel-park-cabins-caravans-800w.webp 800w, /images/te-puke-hostel-park-cabins-caravans-1080w.webp 1080w, /images/te-puke-hostel-park-cabins-caravans.webp 1200w"
    imagesizes="100vw"
    type="image/webp"
    fetchpriority="high"
  />

  <!-- ============================================================
       PERFORMANCE: DNS PREFETCH & PRECONNECT
       Tells the browser to resolve DNS early for external domains
       so map embeds and analytics load faster.
  ============================================================ -->
  <link rel="dns-prefetch" href="https://maps.googleapis.com" />
  <link rel="dns-prefetch" href="https://maps.gstatic.com" />
  <link rel="dns-prefetch" href="https://embed.tawk.to" />
  <link rel="dns-prefetch" href="https://www.clarity.ms" />

  ============================================================ -->

  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

  <meta name="msapplication-config" content="/browserconfig.xml" />

  <!-- ============================================================
       ANALYTICS: MICROSOFT CLARITY
       Loaded with a 2-second delay after the page "load" event
       so it doesn't compete with LCP (Largest Contentful Paint).
  ============================================================ -->
  <script>
    window.addEventListener('load', function () {

          y = l.getElementsByTagName(r)[0]; y.parentNode.insertBefore(t, y);
        })(window, document, "clarity", "script", "vu5e37t3z8");
      }, 2000);
    });
  </script>

  <!--
    CRITICAL: Static hero image painted before React hydrates.
    Positioned to cover the viewport exactly like the React-rendered hero section.
    React replaces #root content; once it mounts, this placeholder is removed.
    The browser's LCP algorithm sees this image at first paint (before JS executes),
    reducing LCP from ~3s to ~1.6s on throttled mobile.
  -->
  <div id="hero-static" style="position:fixed;top:0;left:0;width:100%;height:85vh;min-height:500px;z-index:0;overflow:hidden;pointer-events:none;background:hsl(142,40%,20%)">
